<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Uniswap v4 Pool State — kitchensink/03</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --bg: #0d0d10;
    --panel: #16161b;
    --line: #2a2a33;
    --text: #e8e8ee;
    --muted: #8a8a96;
    --accent: #ff007a;
    --good: #4ade80;
    --warn: #fbbf24;
    --mono: ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 15px/1.5 system-ui, -apple-system, sans-serif;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 24px;
  }
  .wrap { width: 100%; max-width: 760px; }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 32px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .preset-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }
  .preset {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 999px;
    padding: 6px 14px;
    font: inherit;
    font-size: 13px;
    cursor: pointer;
  }
  .preset:hover { border-color: var(--muted); }
  .preset.active { border-color: var(--accent); color: var(--accent); }
  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 12px;
    font: inherit;
    font-family: var(--mono);
    font-size: 13px;
  }
  input:focus { outline: 1px solid var(--accent); }
  .hint {
    color: var(--good);
    font-size: 11px;
    font-family: var(--mono);
    margin-top: 4px;
    min-height: 16px;
    letter-spacing: 0.04em;
  }
  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  .row3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  button[type=submit] {
    width: 100%;
    background: var(--accent);
    color: white;
    border: 0;
    border-radius: 8px;
    padding: 12px 16px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
  }
  button[type=submit]:disabled { opacity: 0.5; cursor: progress; }
  .result {
    display: none;
  }
  .result.show { display: block; }
  .price {
    font-size: 28px;
    font-weight: 600;
    font-family: var(--mono);
    letter-spacing: -0.02em;
    margin: 0 0 4px;
  }
  .price .out { color: var(--good); }
  .meta {
    color: var(--muted);
    font-size: 13px;
    font-family: var(--mono);
    line-height: 1.8;
  }
  .meta .k { color: var(--muted); display: inline-block; min-width: 110px; }
  .meta .v { color: var(--text); }
  .explain {
    margin-top: 18px;
  }
  .explain section {
    border-left: 2px solid var(--line);
    padding: 8px 14px;
    margin-bottom: 14px;
  }
  .explain section h3 {
    margin: 0 0 4px;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .explain section p {
    margin: 0;
    color: var(--text);
    font-size: 14px;
    line-height: 1.55;
  }
  .explain section .lead {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .explain section .aside {
    color: var(--muted);
    font-size: 12px;
    margin-top: 4px;
    font-style: italic;
  }
  .explain section.attention { border-left-color: var(--accent); }
  details {
    border-top: 1px solid var(--line);
    padding-top: 14px;
    margin-top: 14px;
  }
  details summary {
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }
  pre {
    margin: 12px 0 0;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px;
    font-family: var(--mono);
    font-size: 12px;
    overflow: auto;
    max-height: 360px;
  }
  .err {
    color: var(--warn);
    font-family: var(--mono);
    font-size: 13px;
    white-space: pre-wrap;
  }
  .uninit {
    color: var(--warn);
    font-family: var(--mono);
    font-size: 14px;
    padding: 8px 0;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Uniswap v4 — Pool State</h1>
  <div class="sub">
    kitchensink/02 — read pool state directly from the v4 StateView contract on Ethereum mainnet.
  </div>

  <form id="f" class="card">
    <label>Preset</label>
    <div class="preset-row" id="presets"></div>

    <div class="row">
      <div>
        <label for="t0sym">Token0 symbol</label>
        <input id="t0sym" required>
      </div>
      <div>
        <label for="t0addr">Token0 address</label>
        <input id="t0addr" required>
        <div class="hint" id="t0hint"></div>
      </div>
    </div>
    <div class="row">
      <div>
        <label for="t0dec">Token0 decimals</label>
        <input id="t0dec" type="number" required>
      </div>
      <div>
        <label for="t1sym">Token1 symbol</label>
        <input id="t1sym" required>
      </div>
    </div>
    <div class="row">
      <div>
        <label for="t1addr">Token1 address</label>
        <input id="t1addr" required>
        <div class="hint" id="t1hint"></div>
      </div>
      <div>
        <label for="t1dec">Token1 decimals</label>
        <input id="t1dec" type="number" required>
      </div>
    </div>
    <div class="row3">
      <div>
        <label for="fee">Fee (bps)</label>
        <input id="fee" type="number" required>
      </div>
      <div>
        <label for="ts">Tick spacing</label>
        <input id="ts" type="number" required>
      </div>
      <div>
        <label for="hooks">Hooks address</label>
        <input id="hooks" value="0x0000000000000000000000000000000000000000">
      </div>
    </div>
    <button type="submit" id="go">Read pool</button>
  </form>

  <div id="out" class="card result">
    <div class="price"><span id="priceLine"></span></div>
    <div class="explain" id="explainBlock"></div>
    <details>
      <summary>Technical details (advanced)</summary>
      <div class="meta" id="metaBlock" style="margin-top: 12px"></div>
    </details>
    <details>
      <summary>Raw response</summary>
      <pre id="raw"></pre>
    </details>
  </div>
</div>

<script>
// Sorted by address ascending — currency0 < currency1 is required by v4.
// ETH (0x000...) sorts first against every ERC20.
const PRESETS = [
  {
    name: 'ETH / USDC — 0.05%',
    t0: { sym: 'ETH',  addr: '0x0000000000000000000000000000000000000000', dec: 18 },
    t1: { sym: 'USDC', addr: '0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48', dec: 6  },
    fee: 500, ts: 10,
  },
  {
    name: 'ETH / USDC — 0.30%',
    t0: { sym: 'ETH',  addr: '0x0000000000000000000000000000000000000000', dec: 18 },
    t1: { sym: 'USDC', addr: '0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48', dec: 6  },
    fee: 3000, ts: 60,
  },
  {
    name: 'ETH / USDT — 0.05%',
    t0: { sym: 'ETH',  addr: '0x0000000000000000000000000000000000000000', dec: 18 },
    t1: { sym: 'USDT', addr: '0xdAC17F958D2ee523a2206206994597C13D831ec7', dec: 6  },
    fee: 500, ts: 10,
  },
  {
    name: 'USDC / USDT — 0.01%',
    // USDC < USDT lexicographically
    t0: { sym: 'USDC', addr: '0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48', dec: 6 },
    t1: { sym: 'USDT', addr: '0xdAC17F958D2ee523a2206206994597C13D831ec7', dec: 6 },
    fee: 100, ts: 1,
  },
];

const $ = (id) => document.getElementById(id);
const presetsEl = $('presets');

const ZERO_ADDR = '0x0000000000000000000000000000000000000000';

function updateHints() {
  const t0 = $('t0addr').value.trim().toLowerCase();
  const t1 = $('t1addr').value.trim().toLowerCase();
  $('t0hint').textContent = t0 === ZERO_ADDR ? '↑ native ETH (v4 uses 0x0…0 for native)' : '';
  $('t1hint').textContent = t1 === ZERO_ADDR ? '↑ native ETH (v4 uses 0x0…0 for native)' : '';
}

function applyPreset(p) {
  $('t0sym').value = p.t0.sym;
  $('t0addr').value = p.t0.addr;
  $('t0dec').value = p.t0.dec;
  $('t1sym').value = p.t1.sym;
  $('t1addr').value = p.t1.addr;
  $('t1dec').value = p.t1.dec;
  $('fee').value = p.fee;
  $('ts').value = p.ts;
  updateHints();
  for (const b of presetsEl.querySelectorAll('.preset')) b.classList.remove('active');
  presetsEl.querySelector(`[data-name="${p.name}"]`)?.classList.add('active');
}

document.addEventListener('input', updateHints);

for (const p of PRESETS) {
  const b = document.createElement('button');
  b.type = 'button';
  b.className = 'preset';
  b.dataset.name = p.name;
  b.textContent = p.name;
  b.addEventListener('click', () => applyPreset(p));
  presetsEl.appendChild(b);
}
applyPreset(PRESETS[0]);

function fmt(n, max = 4) {
  if (n == null) return '—';
  if (n >= 1) return n.toLocaleString(undefined, { maximumFractionDigits: max });
  return n.toLocaleString(undefined, { maximumSignificantDigits: max });
}

function fmtBig(s) {
  // group thousands without losing precision
  const n = String(s);
  const parts = [];
  for (let i = n.length; i > 0; i -= 3) parts.unshift(n.slice(Math.max(0, i - 3), i));
  return parts.join(',');
}

document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const payload = {
    token0: { address: $('t0addr').value.trim(), decimals: Number($('t0dec').value), symbol: $('t0sym').value.trim() },
    token1: { address: $('t1addr').value.trim(), decimals: Number($('t1dec').value), symbol: $('t1sym').value.trim() },
    fee: Number($('fee').value),
    tickSpacing: Number($('ts').value),
    hooks: $('hooks').value.trim() || '0x0000000000000000000000000000000000000000',
  };

  const btn = $('go');
  btn.disabled = true; btn.textContent = 'Reading…';
  const out = $('out');
  out.classList.remove('show');

  try {
    const res = await fetch('/api/pool', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

    if (!data.initialized) {
      $('priceLine').innerHTML = '<span class="uninit">This pool config exists onchain but no one has used it yet.<br>Try a different fee/tick combo, or another preset.</span>';
      $('explainBlock').innerHTML = '';
      $('metaBlock').innerHTML = `<span class="k">poolId:</span> <span class="v">${data.poolId}</span>`;
    } else {
      const sym0 = payload.token0.symbol;
      const sym1 = payload.token1.symbol;

      // Headline: price both directions
      $('priceLine').innerHTML =
        `1 ${sym0} = <span class="out">${fmt(data.humanPrice)} ${sym1}</span>` +
        `<br><span style="font-size:14px;color:var(--muted)">1 ${sym1} = ${fmt(data.invertedPrice, 8)} ${sym0}</span>`;

      // Plain-English explanation block
      const feePct = payload.fee / 10000;
      const feeStr = feePct.toFixed(2) + '%';
      const feeOn1k = (1000 * feePct / 100).toFixed(2);
      const feeOn100 = (100 * feePct / 100).toFixed(4).replace(/0+$/, '').replace(/\.$/, '');
      const isStablePair = sym0.match(/USD/i) && sym1.match(/USD/i);
      const dynamicFeeNote = data.lpFee !== payload.fee
        ? `Note: an active hook is currently overriding the fee — right now you would actually pay ${(data.lpFee / 10000).toFixed(4)}% per swap, not the static ${feeStr}.`
        : '';
      const protocolNote = data.protocolFee > 0
        ? `Of every fee paid, the Uniswap protocol is taking a ${(data.protocolFee / 10000).toFixed(4)}% cut.`
        : 'The Uniswap protocol itself is not taking a cut from this pool — every fee paid goes to the LPs.';

      $('explainBlock').innerHTML = [
        `<section class="attention">
          <h3>Price right now</h3>
          <p class="lead">1 ${sym0} ≈ ${fmt(data.humanPrice)} ${sym1}</p>
          <p>This pool sets the price by holding both tokens together — the more of one and the less of the other, the higher the price of the rare side.</p>
          <p class="aside">This is a live read from the Uniswap v4 contract on Ethereum mainnet, fetched a moment ago.</p>
        </section>`,
        `<section>
          <h3>Trading fee</h3>
          <p class="lead">${feeStr} per swap${isStablePair ? '' : ` (about $${feeOn1k} on a $1,000 trade)`}</p>
          <p>Anyone swapping ${sym0} ↔ ${sym1} on this pool pays this fee. ${protocolNote}</p>
          ${dynamicFeeNote ? `<p class="aside">${dynamicFeeNote}</p>` : ''}
        </section>`,
        (() => {
          const t0 = data.virtualToken0, t1 = data.virtualToken1;
          // Heuristic: if either side is a USD stablecoin, show a $ total.
          const stable0 = /USD|DAI/i.test(sym0);
          const stable1 = /USD|DAI/i.test(sym1);
          let usdTotal = null;
          if (stable1) usdTotal = t1 + t0 * data.humanPrice;
          else if (stable0) usdTotal = t0 + t1 * data.invertedPrice;
          const t0Str = t0 >= 1 ? fmt(t0, 2) : fmt(t0, 4);
          const t1Str = t1 >= 1 ? fmt(t1, 2) : fmt(t1, 4);
          const usdLine = usdTotal != null
            ? `That's roughly <b>$${fmt(usdTotal, 0)}</b> backing the spot price right now.`
            : '';
          return `<section>
            <h3>How deep is this pool</h3>
            <p class="lead">Effectively <b>${t0Str} ${sym0}</b> + <b>${t1Str} ${sym1}</b> active at the current price.</p>
            <p>${usdLine} Bigger numbers here mean less price impact when someone makes a big trade — the pool can absorb more without the price moving much.</p>
            <p class="aside">This snapshot is the "active tick" only — the slice of liquidity that responds to a tiny next swap. Other LPs may have positions parked at higher or lower prices that wake up only if the price moves there. So the *full* TVL of this pool can be larger than what you see here.</p>
          </section>`;
        })(),
        `<section>
          <h3>Pool identity</h3>
          <p class="lead">A unique pool exists for every combo of (token A, token B, fee, tick spacing, hook).</p>
          <p>That means there can be many ETH/${sym1} pools — each with different fees or behaviours. You're looking at one specific configuration.</p>
          <p class="aside">poolId on chain: <code style="font-size:11px">${data.poolId.slice(0,18)}…${data.poolId.slice(-6)}</code></p>
        </section>`,
      ].join('');

      // Technical details (collapsible) — exact raw values for advanced users
      $('metaBlock').innerHTML = [
        `<span class="k">fee (static):</span> <span class="v">${feeStr} (${payload.fee} bps)</span>`,
        `<span class="k">lpFee (now):</span> <span class="v">${(data.lpFee / 10000).toFixed(4)}% (${data.lpFee} bps)</span>`,
        `<span class="k">protocolFee:</span> <span class="v">${data.protocolFee} (${(data.protocolFee / 10000).toFixed(4)}%)</span>`,
        `<span class="k">tick:</span> <span class="v">${data.tick}</span>`,
        `<span class="k">tick spacing:</span> <span class="v">${payload.tickSpacing}</span>`,
        `<span class="k">liquidity (L):</span> <span class="v">${fmtBig(data.liquidity)}</span>`,
        `<span class="k">sqrtPriceX96:</span> <span class="v">${data.sqrtPriceX96}</span>`,
        `<span class="k">poolId:</span> <span class="v" style="font-size:11px">${data.poolId}</span>`,
      ].join('<br>');
    }

    $('raw').textContent = JSON.stringify(data, null, 2);
    out.classList.add('show');
  } catch (err) {
    $('priceLine').innerHTML = `<span class="err">${err.message}</span>`;
    $('explainBlock').innerHTML = '';
    $('metaBlock').textContent = '';
    $('raw').textContent = err.stack || err.message || '';
    out.classList.add('show');
  } finally {
    btn.disabled = false; btn.textContent = 'Read pool';
  }
});
</script>
</body>
</html>
