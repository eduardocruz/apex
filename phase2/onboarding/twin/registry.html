<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Apex — Citizen Registry</title>
<style>
  :root {
    --bg: #0e0f12; --fg: #eaeaea; --muted: #888; --accent: #ffd166;
    --card: #1a1c22; --border: #2a2d35; --pick: #2a3142;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.55 -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--fg); }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }
  header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 24px; }
  h1 { font-size: 22px; margin: 0; }
  nav a { color: var(--muted); text-decoration: none; font-size: 13px; margin-right: 12px; }
  nav a:hover { color: var(--accent); }
  nav a.active { color: var(--fg); }
  .lede { color: var(--muted); margin: 0 0 24px; font-size: 13px; }
  .stats { display: flex; gap: 14px; margin-bottom: 18px; flex-wrap: wrap; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; min-width: 130px; }
  .stat .num { color: var(--accent); font: 700 22px ui-monospace, Menlo, monospace; line-height: 1; margin-bottom: 4px; }
  .stat .lbl { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
  .citizen { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; margin-bottom: 12px; display: grid; grid-template-columns: 1fr auto; gap: 12px; }
  .citizen.genesis { border-left: 3px solid var(--accent); }
  .ens { font: 600 15px ui-monospace, Menlo, monospace; color: var(--fg); }
  .ens a { color: inherit; text-decoration: none; }
  .ens a:hover { color: var(--accent); }
  .meta { color: var(--muted); font-size: 12px; margin-top: 4px; font-family: ui-monospace, Menlo, monospace; }
  .role-badge { display: inline-block; background: var(--pick); color: var(--accent); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-family: ui-monospace, Menlo, monospace; margin-right: 6px; }
  .genesis-badge { background: #3a2c10; color: var(--accent); border: 1px solid var(--accent); }
  .founder-badge { background: #1a3a1a; color: #82bf85; }
  .traits { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 12px; }
  .trait { background: #14161c; border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 11px; }
  .trait .k { color: var(--muted); display: block; margin-bottom: 2px; font-size: 10px; }
  .trait .v { color: var(--accent); font-weight: 600; font-family: ui-monospace, Menlo, monospace; font-size: 13px; }
  .trait .bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 4px; overflow: hidden; }
  .trait .bar-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
  .voice-pills { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .pill { background: var(--pick); border: 1px solid var(--accent); color: var(--accent); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-family: ui-monospace, Menlo, monospace; }
  .right { text-align: right; }
  .balance { color: var(--accent); font: 600 17px ui-monospace, Menlo, monospace; }
  .balance-lbl { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
  .empty { background: var(--card); border: 1px dashed var(--border); border-radius: 10px; padding: 40px; text-align: center; color: var(--muted); }
  .empty a { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Apex Citizen Registry</h1>
    <nav>
      <a href="/registry" class="active">Registry</a>
      <a href="/">Mint a Twin</a>
    </nav>
  </header>
  <p class="lede">Every citizen of the Apex network state. Click any ENS to verify it resolves.</p>
  <div class="stats" id="stats"></div>
  <div id="list"></div>
</div>

<script>
const ROLE_ORDER = ["executive", "legislative", "judicial", "ambassador", "worker", "outsider"];

async function load() {
  const r = await fetch("/api/citizens");
  const data = await r.json();

  const stats = document.getElementById("stats");
  const genesisCount = data.citizens.filter(c => c.genesis).length;
  const founderCount = data.citizens.filter(c => c.founder).length;
  const roles = new Set(data.citizens.map(c => c.role));

  stats.innerHTML = `
    <div class="stat"><div class="num">${data.count}</div><div class="lbl">citizens total</div></div>
    <div class="stat"><div class="num">${genesisCount}</div><div class="lbl">genesis</div></div>
    <div class="stat"><div class="num">${founderCount}</div><div class="lbl">founders</div></div>
    <div class="stat"><div class="num">${roles.size}</div><div class="lbl">roles filled</div></div>
    <div class="stat"><div class="num">${data.parent}</div><div class="lbl">parent ens</div></div>
  `;

  const list = document.getElementById("list");
  if (data.count === 0) {
    list.innerHTML = `<div class="empty">No citizens yet. <a href="/">Mint the first twin →</a></div>`;
    return;
  }

  // Sort: genesis first, then by role order, then by minted_at
  const sorted = [...data.citizens].sort((a, b) => {
    if (a.genesis !== b.genesis) return b.genesis - a.genesis;
    const ra = ROLE_ORDER.indexOf(a.role), rb = ROLE_ORDER.indexOf(b.role);
    if (ra !== rb) return ra - rb;
    return new Date(a.minted_at) - new Date(b.minted_at);
  });

  list.innerHTML = sorted.map(c => {
    if (c.error) return `<div class="citizen"><div>${escapeHtml(c.slug)} — <span style="color:#d97a7a;">error: ${escapeHtml(c.error)}</span></div></div>`;
    const traits = Object.entries(c.traits || {}).map(([k, v]) => `
      <div class="trait">
        <span class="k">${k.replace(/_/g, " ")}</span>
        <span class="v">${(v).toFixed(2)}</span>
        <div class="bar"><div class="bar-fill" style="width:${v*100}%"></div></div>
      </div>
    `).join("");
    const voice = (c.voice || []).map(v => `<span class="pill">${escapeHtml(v)}</span>`).join("");
    const badges = [
      `<span class="role-badge">${escapeHtml(c.role)}</span>`,
      c.genesis ? `<span class="role-badge genesis-badge">genesis</span>` : "",
      c.founder ? `<span class="role-badge founder-badge">founder</span>` : "",
    ].join("");
    return `
      <div class="citizen ${c.genesis ? "genesis" : ""}">
        <div>
          <div>${badges}</div>
          <div class="ens" style="margin-top: 8px;">
            <a href="https://app.ens.domains/${c.ens}" target="_blank">${escapeHtml(c.ens || "(unset)")}</a>
          </div>
          <div class="meta">${escapeHtml(c.address || "(no address)")}</div>
          ${traits ? `<div class="traits">${traits}</div>` : ""}
          ${voice ? `<div class="voice-pills">${voice}</div>` : ""}
        </div>
        <div class="right">
          <div class="balance">${(c.balance_og || 0).toFixed(2)} OG</div>
          <div class="balance-lbl">treasury</div>
          <div class="meta" style="margin-top: 8px;">${c.actions} actions</div>
        </div>
      </div>
    `;
  }).join("");
}

function escapeHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

load();
</script>
</body>
</html>
